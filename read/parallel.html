<style>

body {

  overflow: hidden;

.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

iframe {
  flex: 1;
  border: none;
  min-height: 0;
  display: block;
}

#splitter:hover,
#splitter.dragging {
  background: var(--darkborder);
}
#splitter {
  width: 3pt;
  background: var(--nearblack);
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
}
#splitter::after {
  content: '';
  position: absolute;
  inset: 0;
  margin: auto;
  width: 1pt;
  height: 36pt;
  background: var(--whitetext);
}
</style>

<body>

  <div class="pane" id="pane0">
    <iframe id="frame0"></iframe>
  </div>

  <div id="splitter"></div>

  <div class="pane" id="pane1">
    <iframe id="frame1"></iframe>
  </div>


<script>

const frames = [
  document.getElementById('frame0'),
  document.getElementById('frame1'),
];

/* ── File map ──────────────────────────────────────────────────────────────
   Each row is [HIERO path, HIERO-NT path].
   HIERO-NT entries are unique; HIERO entries may repeat.
   When navigating from HIERO and multiple rows share the same HIERO path,
   the viewer prefers the row whose HIERO-NT path matches what is already
   showing in the HIERO-NT frame, then falls back to the first match.
─────────────────────────────────────────────────────────────────────────── */
const fileMap = [

  ["HIERO/read/29%20Jol.html", "HIERO-NT/read/lxx-29%20Jol.html"],
  ["HIERO/read/30%20Amo.html", "HIERO-NT/read/lxx-30%20Amo.html"],
  ["HIERO/read/31%20Oba.html", "HIERO-NT/read/lxx-31%20Oba.html"],
  ["HIERO/read/32%20Jon.html", "HIERO-NT/read/lxx-32%20Jon.html"],
  ["HIERO/read/33%20Mic.html", "HIERO-NT/read/lxx-33%20Mic.html"],
  ["HIERO/read/34%20Nam.html", "HIERO-NT/read/lxx-34%20Nam.html"],
  ["HIERO/read/35%20Hab.html", "HIERO-NT/read/lxx-35%20Hab.html"],
  ["HIERO/read/36%20Zep.html", "HIERO-NT/read/lxx-36%20Zep.html"],
  ["HIERO/read/37%20Hag.html", "HIERO-NT/read/lxx-37%20Hag.html"],
  ["HIERO/read/38%20Zec.html", "HIERO-NT/read/lxx-38%20Zec.html"],
  ["HIERO/read/39%20Mal.html", "HIERO-NT/read/lxx-39%20Mal.html"],
  ["HIERO/read/40%20Jdt.html", "HIERO-NT/read/lxx-40%20Jdt.html"],
  ["HIERO/read/41%20Tob.html", "HIERO-NT/read/lxx-41%20Tob.html"],
  ["HIERO/read/42%201Mc.html", "HIERO-NT/read/lxx-42%201Mc.html"],
  ["HIERO/read/43%202Mc.html", "HIERO-NT/read/lxx-43%202Mc.html"],
  ["HIERO/read/44%20Wis.html", "HIERO-NT/read/lxx-44%20Wis.html"],
  ["HIERO/read/45%20Sir.html", "HIERO-NT/read/lxx-45%20Sir.html"],
  ["HIERO/read/46%20Bar.html", "HIERO-NT/read/lxx-46%20Bar.html"],
];

// Resolve every path to an absolute URL once, for reliable href comparison.
const base = new URL("../../", location.href);
const resolvedMap = fileMap.map(pair => 
  pair.map(rel => new URL(rel, base).href)
);

/* ── State ─────────────────────────────────────────────────────────────── */

const loaded    = [false, false];
const aborts    = [null, null];   // AbortController per frame scroll direction
let syncing     = false;          // scroll-sync guard
let syncTimer   = null;
let navSyncing  = false;          // navigation-sync guard

/* ── Navigation sync ───────────────────────────────────────────────────── */

function getFrameHref(frame) {
  try { return frame.contentWindow.location.href; } catch { return null; }
}

/**
 * Called after frame[srcIdx] finishes loading (user-initiated navigation).
 * Finds the counterpart URL and loads it into the other frame.
 */
function syncNavigation(srcIdx) {
  const srcUrl = getFrameHref(frames[srcIdx]);
  if (!srcUrl) return;

  const dstIdx = 1 - srcIdx;
  const dstUrl = getFrameHref(frames[dstIdx]);

  // All rows where column[srcIdx] matches the source URL.
  const matches = resolvedMap.filter(row => row[srcIdx] === srcUrl);
  if (matches.length === 0) return;  // URL not in the map — leave other frame alone

  let target;
  if (matches.length === 1) {
    target = matches[0][dstIdx];
  } else {
    // Duplicate HIERO key: prefer the row that keeps the current HIERO-NT page,
    // otherwise take the first row.
    const sameAsCurrent = matches.find(row => row[dstIdx] === dstUrl);
    target = sameAsCurrent ? sameAsCurrent[dstIdx] : matches[0][dstIdx];
  }

  if (target === dstUrl) return;  // destination is already correct

  navSyncing = true;
  frames[dstIdx].src = target;
  // navSyncing is cleared inside onLoaded() when dstIdx fires.
}

/* ── Scroll-sync helpers ───────────────────────────────────────────────── */

function getOffsetInScroller(el, scroller) {
  return el.getBoundingClientRect().top
       - scroller.getBoundingClientRect().top
       + scroller.scrollTop;
}

function getTopmostId(frame) {
  const doc = frame.contentDocument;
  if (!doc) return null;
  const scroller = doc.getElementById('printable');
  if (!scroller) return null;
  const candidates = doc.querySelectorAll('#table-of-sections, #translation [id]');

    const el = doc.getElementById('table-of-sections');
    const top = getOffsetInScroller(el, scroller);
    if (top + el.offsetHeight > scroller.scrollTop) return el.id;
  
  for (const el of candidates) {
    const top = getOffsetInScroller(el, scroller);
    if (top + el.offsetHeight > scroller.scrollTop) return el.id;
  }
  return null;
}

function scrollToId(frame, id) {
  const doc = frame.contentDocument;
  if (!doc) return;
  const scroller = doc.getElementById('printable');
  const el = doc.getElementById(id);
  if (!scroller || !el) return;
  scroller.scrollTop = getOffsetInScroller(el, scroller);
}

/* ── Scroll listener attachment ────────────────────────────────────────── */

function attachListener(srcIdx) {
  if (aborts[srcIdx]) aborts[srcIdx].abort();
  aborts[srcIdx] = new AbortController();
  const { signal } = aborts[srcIdx];

  const src = frames[srcIdx];
  const dst = frames[1 - srcIdx];
  const scroller = src.contentDocument?.getElementById('printable');
  if (!scroller) return;

	scroller.addEventListener('scrollend', () => {
	  if (syncing) return;
	  const id = getTopmostId(src);
	  if (!id) return;
	  syncing = true;
	  clearTimeout(syncTimer);

	  const srcScroller = src.contentDocument?.getElementById('printable');
	  const dstScroller = dst.contentDocument?.getElementById('printable');
	  const dstEl = dst.contentDocument?.getElementById(id);

	  if (srcScroller && dstScroller && dstEl) {
	    const srcMax = srcScroller.scrollHeight - srcScroller.clientHeight;
	    const srcAtBottom = srcScroller.scrollTop >= srcMax - 2;
	    const targetTop = getOffsetInScroller(dstEl, dstScroller);
	    const dstMax = dstScroller.scrollHeight - dstScroller.clientHeight;

	    if (srcAtBottom || targetTop >= dstMax) {
	      // Near the tail — sync dst as far as it goes, leave src alone
	      dstScroller.scrollTop = Math.min(targetTop, dstMax);
	    } else {
	      // Normal sync — snap both
	      scrollToId(src, id);
	      scrollToId(dst, id);
	    }
	  }

	  syncTimer = setTimeout(() => { syncing = false; }, 500);
	}, { signal });
}

/* ── Frame load handler ────────────────────────────────────────────────── */

function onLoaded(idx) {
  loaded[idx] = true;
  attachListener(idx);
  if (loaded[1 - idx]) attachListener(1 - idx);

  if (navSyncing) {
    // This load was triggered programmatically by syncNavigation().
    // Clear the guard and stop — do not recurse.
    navSyncing = false;
    return;
  }

  // User-initiated navigation: sync the other frame.
  syncNavigation(idx);
}

/* ── Splitter drag ─────────────────────────────────────────────────────── */

const splitter = document.getElementById('splitter');
const panes    = [
  document.getElementById('pane0'),
  document.getElementById('pane1'),
];

let isDragging = false;
let dragStartX, startWidths;

splitter.addEventListener('mousedown', e => {
  isDragging   = true;
  dragStartX   = e.clientX;
  startWidths  = panes.map(p => p.getBoundingClientRect().width);
  splitter.classList.add('dragging');
  document.body.style.userSelect    = 'none';
  document.body.style.pointerEvents = 'none';
  splitter.style.pointerEvents      = 'auto';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx    = e.clientX - dragStartX;
  const total = startWidths[0] + startWidths[1];
  const left  = Math.max(160, Math.min(total - 160, startWidths[0] + dx));
  panes[0].style.flex  = 'none';
  panes[0].style.width = left + 'px';
  panes[1].style.flex  = '1';
  panes[1].style.width = '';
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  splitter.classList.remove('dragging');
  document.body.style.userSelect    = '';
  document.body.style.pointerEvents = '';
  splitter.style.pointerEvents      = '';
});

/* ── Initial load ──────────────────────────────────────────────────────── */

[0, 1].forEach(i => {
  loaded[i] = false;
  frames[i].addEventListener('load', () => onLoaded(i));
  frames[i].src = resolvedMap[0][i];
});

</script>
